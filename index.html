<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Smart Incubator Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffde7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #fbc02d !important; border-bottom: 5px solid #f9a825; }
        .egg-card { background: white; border-radius: 20px; border-left: 10px solid #fbc02d; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .data-val { font-size: 2.5rem; font-weight: bold; color: #f57f17; }
        .table-yellow { background-color: #fff9c4; }
        th { background-color: #fbc02d !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark shadow mb-4">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1 text-dark">Smart Incubator: Sistem Penetasan Telur Otomatis berbasis IoT dengan Deteksi Suara</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 text-center mb-4">
            <div class="col-md-3"><div class="egg-card"><h5>Suhu</h5><div id="t" class="data-val">0</div>C</div></div>
            <div class="col-md-3"><div class="egg-card"><h5>Kelembaban</h5><div id="h" class="data-val">0</div>%</div></div>
            <div class="col-md-3"><div class="egg-card"><h5>Suara</h5><div id="s" class="data-val">0</div></div></div>
            <div class="col-md-3"><div class="egg-card"><h5>Servo</h5><div id="srv" class="data-val" style="font-size: 1.5rem;">Diam</div></div></div>
        </div>

        <div class="row mb-4">
            <div class="col-md-8"><div class="egg-card"><h5>Grafik Monitoring</h5><canvas id="myChart"></canvas></div></div>
            <div class="col-md-4">
                <div class="egg-card h-100">
                    <h5>Status Aktuator</h5>
                    <ul class="list-group list-group-flush text-start">
                        <li class="list-group-item d-flex justify-content-between">Lampu: <span id="l_i" class="badge">OFF</span></li>
                        <li class="list-group-item d-flex justify-content-between">Fan: <span id="f_i" class="badge">OFF</span></li>
                        <li class="list-group-item mt-3"><b>Anggota Kelompok:</b><br><small>Faiz, Nanda, Aldi, Siti, Nayla</small></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="egg-card">
            <h5>Tabel Riwayat Terakhir</h5>
            <div class="table-responsive">
                <table class="table table-yellow table-hover">
                    <thead><tr><th>Waktu</th><th>Suhu</th><th>Humi</th><th>Servo</th><th>Fan</th><th>Lamp</th><th>Suara</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://smart-bsf-reactor-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{label:'Suhu', data:[], borderColor:'#f44336'}, {label:'Humi', data:[], borderColor:'#2196f3'}] }
        });

        db.ref('inkubator').on('value', (snap) => {
            const val = snap.val();
            document.getElementById('t').innerText = val.temp.toFixed(1);
            document.getElementById('h').innerText = val.humi.toFixed(0);
            document.getElementById('s').innerText = val.sound;
            document.getElementById('srv').innerText = val.servo;
            document.getElementById('l_i').innerText = val.lamp ? "ON" : "OFF";
            document.getElementById('l_i').className = val.lamp ? "badge bg-success" : "badge bg-danger";
            document.getElementById('f_i').innerText = val.fan ? "ON" : "OFF";
            document.getElementById('f_i').className = val.fan ? "badge bg-success" : "badge bg-danger";

            // Update Chart
            if(chart.data.labels.length > 10) chart.data.labels.shift();
            chart.data.labels.push(new Date().toLocaleTimeString());
            chart.data.datasets[0].data.push(val.temp);
            chart.data.datasets[1].data.push(val.humi);
            chart.update(); 

            // Update Table
            const row = `<tr><td>${val.time}</td><td>${val.temp}</td><td>${val.humi}</td><td>${val.servo}</td><td>${val.fan}</td><td>${val.lamp}</td><td>${val.sound}</td></tr>`;
            document.getElementById('table-body').innerHTML = row + document.getElementById('table-body').innerHTML;
        });
    </script>
</body>
</html>
