<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart BSF Reactor - Group 5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; padding: 40px; }
        .card-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 200px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .value { font-size: 2.5em; font-weight: bold; color: #27ae60; }
        .status-label { margin-top: 25px; font-weight: bold; padding: 10px 20px; background: #dfe6e9; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Smart BSF Reactor Dashboard</h1>
    <div class="card-container">
        <div class="card">
            <h3>Suhu</h3>
            <div class="value"><span id="temp">--</span>°C</div>
        </div>
        <div class="card">
            <h3>Amonia</h3>
            <div class="value"><span id="amonia">--</span></div>
        </div>
    </div>
    <div class="status-label">Status: <span id="status">Menghubungkan ke Firebase...</span></div>

    <script>
        // URL DATABASE SINGAPORE SESUAI GAMBAR KAMU
        const firebaseConfig = {
            databaseURL: "https://smart-bsf-reactor-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("monitoring").on("value", (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("temp").innerText = data.temp;
                document.getElementById("amonia").innerText = data.amonia;
                document.getElementById("status").innerText = data.status;
            } else {
                document.getElementById("status").innerText = "Data belum tersedia di Firebase";
            }
        });
    </script>
</body>
</html>
