<!DOCTYPE html>
<html>
<head>
    <title>Inkubator Monitoring</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .value { font-size: 2em; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>
    <h1>Smart Inkubator Dashboard</h1>
    <div class="card">
        <p>Suhu Sekarang</p>
        <div id="temp" class="value">0.0</div><span>°C</span>
    </div>
    <div class="card">
        <p>Kelembaban Sekarang</p>
        <div id="humi" class="value">0</div><span>%</span>
    </div>
    <div class="card">
        <p>Status Sistem</p>
        <div id="status" style="font-weight:bold;">Memuat...</div>
    </div>

    <script>
        // GANTI DENGAN CONFIG FIREBASE KAMU SENDIRI
        const firebaseConfig = {
            databaseURL: "https://smart-bsf-reactor-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil data real-time dari node /inkubator (sesuai kodingan ESP32 baru)
        db.ref('inkubator').on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('temp').innerText = data.temp;
            document.getElementById('humi').innerText = data.humi;
            document.getElementById('status').innerText = data.status;
        });
    </script>
</body>
</html>
