<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Inkubator - Faiz Rasyad dkk</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 25px; transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .val { font-size: 3rem; font-weight: 800; color: #00d4ff; }
        .status-badge { padding: 10px 20px; border-radius: 50px; font-weight: bold; background: #2ecc71; }
    </style>
</head>
<body>
    <div class="container py-5 text-center">
        <h1 class="mb-2">SMART EGG INCUBATOR</h1>
        <p class="mb-5 text-uppercase" style="letter-spacing: 2px;">Developed by: Faiz, Nanda, Setrialdi, Siti, Nayla</p>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="glass-card">
                    <h5>SUHU</h5>
                    <div id="temp" class="val">0.0</div><small>Celsius</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card">
                    <h5>KELEMBABAN</h5>
                    <div id="humi" class="val">0</div><small>Persen (%)</small>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card">
                    <h5>STATUS</h5>
                    <div id="status" class="mt-3 status-badge">MONITORING</div>
                </div>
            </div>
        </div>

        <div class="mt-5 glass-card">
            <h4>Remote Control</h4>
            <button class="btn btn-outline-light m-2" onclick="toggleRelay('lamp')">Toggle Lampu</button>
            <button class="btn btn-outline-light m-2" onclick="toggleRelay('fan')">Toggle Kipas</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://smart-bsf-reactor-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('inkubator').on('value', (snap) => {
            const d = snap.val();
            document.getElementById('temp').innerText = d.temp.toFixed(1);
            document.getElementById('humi').innerText = d.humi.toFixed(0);
            document.getElementById('status').innerText = d.msg;
            if(d.msg === "Menetas") document.getElementById('status').style.background = "#e74c3c";
        });
    </script>
</body>
</html>
